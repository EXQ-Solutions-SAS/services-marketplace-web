name: Angular Frontend CI/CD

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # O la que estés usando
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # 'npm ci' es más rápido y seguro en pipelines que 'npm install'

      # --- CALIDAD ---
      - name: Linting
        run: npm run lint || echo "Linting failed, checking manually later"

      # --- PRUEBAS (En modo Headless) ---
      # Nota: Para que esto funcione en GitHub, necesitas configurar Karma para usar ChromeHeadless
      # - name: Run Unit Tests
      #   run: npm test -- --watch=false --browsers=ChromeHeadless

      # --- BUILD DE PRODUCCIÓN ---
      - name: Build Project
        run: npm run build -- --configuration=production

      # --- DESPLIEGUE (COMENTADO - Ejemplo para Firebase Hosting o Vercel) ---
      # - name: Deploy to Firebase Hosting
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken: ${{ secrets.GITHUB_TOKEN }}
      #     firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      #     projectId: tu-proyecto-id