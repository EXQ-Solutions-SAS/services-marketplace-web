<main class="min-h-screen flex items-center justify-center p-6 bg-bg-dark">
  <div class="max-w-md w-full bg-card-bg p-8 rounded-xl-custom shadow-2xl border border-white/5">
    
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-black text-primary-orange mb-2 tracking-tight">ADMIN PORTAL</h1>
      <p class="text-slate-400 text-sm font-medium">Ingresa tus credenciales</p>
    </div>
    
    <form class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Email Address</label>
        <input type="email" placeholder="admin@marketplace.com" class="app-input">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Password</label>
        <input type="password" placeholder="••••••••" class="app-input">
      </div>

      <button type="button" class="app-button shadow-lg shadow-primary-orange/20">
        CONTINUAR
      </button>

      <p class="text-center text-slate-500 text-sm hover:text-primary-orange cursor-pointer transition-colors">
        ¿Olvidaste tu contraseña?
      </p>
    </form>
  </div>
</main>
