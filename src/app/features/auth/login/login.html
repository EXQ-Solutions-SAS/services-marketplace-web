<main class="min-h-screen flex items-center justify-center p-6 bg-bg-dark">
  <div class="max-w-md w-full bg-card-bg p-8 rounded-xl-custom shadow-2xl border border-white/5">

    <h1 class="text-3xl font-black text-primary-orange mb-6 text-center tracking-tight">ADMIN PORTAL</h1>

    @if (errorMessage()) {
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/50 text-red-500 text-sm rounded-lg text-center">
      {{ errorMessage() }}
    </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Email</label>
        <input type="email" formControlName="email" placeholder="admin@market.com" class="app-input">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" class="app-input">
      </div>

      <button type="submit" [disabled]="isLoading() || loginForm.invalid"
        class="app-button shadow-lg shadow-primary-orange/20 disabled:opacity-50 disabled:cursor-not-allowed">
        @if (isLoading()) {
        <span>Cargando...</span>
        } @else {
        <span>Iniciar sesion</span>
        }
      </button>
    </form>
  </div>
</main>
